<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Ecosystem Diagram</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .back-link {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600;
      color: #6366f1; text-decoration: none;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 6px 12px;
    }
    .back-link:hover { background: #f8fafc; }
    .doc-footer a { text-decoration: none; font-weight: 600; color: #6366f1; }
    .doc-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const concepts = [
      {
        id: "commands",
        label: "Commands",
        emoji: "\u26A1",
        color: "#d97706",
        bg: "#fffbeb",
        border: "#fde68a",
        scope: "Claude Code only",
        activation: "User types /cmd",
        tokenCost: "Minimal",
        bestFor: "Manual workflows",
        install: ".claude/commands/<name>.md",
        examples: ["/review", "/deploy", "/write-plan", "/audit", "/create-skill"],
        tagline: "The shortcuts \u2014 workflows you trigger on demand",
        builtins: [
          { cmd: "/clear", desc: "Wipe conversation history" },
          { cmd: "/context", desc: "Check token usage" },
          { cmd: "/compact", desc: "Summarize to save tokens" },
          { cmd: "/resume", desc: "Restore a previous conversation" },
          { cmd: "/cost", desc: "Show session token cost" },
          { cmd: "/hooks", desc: "Manage hooks interactively" },
        ],
      },
      {
        id: "mcp",
        label: "MCP / Tools",
        emoji: "\uD83D\uDD27",
        color: "#6366f1",
        bg: "#eef2ff",
        border: "#c7d2fe",
        scope: "Claude-wide + Multi-vendor",
        activation: "On demand",
        tokenCost: "High (front-loaded)",
        bestFor: "External APIs & data",
        install: "claude mcp add <server>",
        examples: ["GitHub", "Postgres", "Slack", "Filesystem", "Brave Search"],
        tagline: "The nervous system \u2014 connects Claude to the outside world",
      },
      {
        id: "skills",
        label: "Skills",
        emoji: "\uD83E\uDDE0",
        color: "#0891b2",
        bg: "#ecfeff",
        border: "#a5f3fc",
        scope: "Claude-wide",
        activation: "Auto (context-matching)",
        tokenCost: "~100 tokens until needed",
        bestFor: "Repeatable expertise",
        install: ".claude/skills/<name>/SKILL.md",
        examples: ["tdd", "code-review", "docx", "internal-comms", "deploy"],
        tagline: "The playbook \u2014 teaches Claude how to do things, loaded on demand",
      },
      {
        id: "hooks",
        label: "Hooks",
        emoji: "\uD83D\uDEE1\uFE0F",
        color: "#dc2626",
        bg: "#fef2f2",
        border: "#fecaca",
        scope: "Claude Code only",
        activation: "Always \u2014 guaranteed",
        tokenCost: "Zero (runs outside Claude)",
        bestFor: "Enforcing quality gates",
        install: ".claude/settings.json or /hooks menu",
        examples: ["Auto-lint on save", "Block commit if tests fail", "Desktop notification on idle", "Security scan on prompt"],
        tagline: "The guardrails \u2014 deterministic rules that always fire",
      },
      {
        id: "plugins",
        label: "Plugins",
        emoji: "\uD83D\uDCE6",
        color: "#7c3aed",
        bg: "#f5f3ff",
        border: "#ddd6fe",
        scope: "Claude Code only",
        activation: "Via install",
        tokenCost: "Depends on contents",
        bestFor: "Team sharing & distribution",
        install: "/plugin install <name>",
        examples: ["supabase-pack", "devops-automation-pack", "skills-toolkit", "openrouter-pack"],
        tagline: "The container \u2014 bundles Commands, MCP, Skills & Hooks to share",
      },
    ];

    const learningSteps = [
      { id: "commands", label: "1. Start here", note: "Built-in commands work immediately, then add your own" },
      { id: "mcp",      label: "2. Connect tools", note: "Link Claude to your external services" },
      { id: "skills",   label: "3. Teach expertise", note: "Package workflows so Claude auto-applies them" },
      { id: "hooks",    label: "4. Enforce rules", note: "Make quality standards guaranteed, not optional" },
      { id: "plugins",  label: "5. Share & scale", note: "Bundle your setup for your team" },
    ];

    function App() {
      const [active, setActive] = useState(null);

      return (
        <div style={{ fontFamily: "'Segoe UI', sans-serif", background: "#f8fafc", minHeight: "100vh", padding: "24px 16px" }}>
          <div style={{ maxWidth: 860, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: "#94a3b8", textTransform: "uppercase", marginBottom: 6 }}>Reference Guide</div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}><svg width="28" height="28" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg"><path fill="#d97757" d="M 233.959793 800.214905 L 468.644287 668.536987 L 472.590637 657.100647 L 468.644287 650.738403 L 457.208069 650.738403 L 417.986633 648.322144 L 283.892639 644.69812 L 167.597321 639.865845 L 54.926208 633.825623 L 26.577238 627.785339 L 3.3e-05 592.751709 L 2.73832 575.27533 L 26.577238 559.248352 L 60.724873 562.228149 L 136.187973 567.382629 L 249.422867 575.194763 L 331.570496 580.026978 L 453.261841 592.671082 L 472.590637 592.671082 L 475.328857 584.859009 L 468.724915 580.026978 L 463.570557 575.194763 L 346.389313 495.785217 L 219.543671 411.865906 L 153.100723 363.543762 L 117.181267 339.060425 L 99.060455 316.107361 L 91.248367 266.01355 L 123.865784 230.093994 L 167.677887 233.073853 L 178.872513 236.053772 L 223.248367 270.201477 L 318.040283 343.570496 L 441.825592 434.738342 L 459.946411 449.798706 L 467.194672 444.64447 L 468.080597 441.020203 L 459.946411 427.409485 L 392.617493 305.718323 L 320.778564 181.932983 L 288.80542 130.630859 L 280.348999 99.865845 C 277.369171 87.221436 275.194641 76.590698 275.194641 63.624268 L 312.322174 13.20813 L 332.8591 6.604126 L 382.389313 13.20813 L 403.248352 31.328979 L 434.013519 101.71814 L 483.865753 212.537048 L 561.181274 363.221497 L 583.812134 407.919434 L 595.892639 449.315491 L 600.40271 461.959839 L 608.214783 461.959839 L 608.214783 454.711609 L 614.577271 369.825623 L 626.335632 265.61084 L 637.771851 131.516846 L 641.718201 93.745117 L 660.402832 48.483276 L 697.530334 24.000122 L 726.52356 37.852417 L 750.362549 72 L 747.060486 94.067139 L 732.886047 186.201416 L 705.100708 330.52356 L 686.979919 427.167847 L 697.530334 427.167847 L 709.61084 415.087341 L 758.496704 350.174561 L 840.644348 247.490051 L 876.885925 206.738342 L 919.167847 161.71814 L 946.308838 140.29541 L 997.61084 140.29541 L 1035.38269 196.429626 L 1018.469849 254.416199 L 965.637634 321.422852 L 921.825562 378.201538 L 859.006714 462.765259 L 819.785278 530.41626 L 823.409424 535.812073 L 832.75177 534.92627 L 974.657776 504.724915 L 1051.328979 490.872559 L 1142.818848 475.167786 L 1184.214844 494.496582 L 1188.724854 514.147644 L 1172.456421 554.335693 L 1074.604126 578.496765 L 959.838989 601.449829 L 788.939636 641.879272 L 786.845764 643.409485 L 789.261841 646.389343 L 866.255127 653.637634 L 899.194702 655.409424 L 979.812134 655.409424 L 1129.932861 666.604187 L 1169.154419 692.537109 L 1192.671265 724.268677 L 1188.724854 748.429688 L 1128.322144 779.194641 L 1046.818848 759.865845 L 856.590759 714.604126 L 791.355774 698.335754 L 782.335693 698.335754 L 782.335693 703.731567 L 836.69812 756.885986 L 936.322205 846.845581 L 1061.073975 962.81897 L 1067.436279 991.490112 L 1051.409424 1014.120911 L 1034.496704 1011.704712 L 924.885986 929.234924 L 882.604126 892.107544 L 786.845764 811.48999 L 780.483276 811.48999 L 780.483276 819.946289 L 802.550415 852.241699 L 919.087341 1027.409424 L 925.127625 1081.127686 L 916.671204 1098.604126 L 886.469849 1109.154419 L 853.288696 1103.114136 L 785.073914 1007.355835 L 714.684631 899.516785 L 657.906067 802.872498 L 650.979858 806.81897 L 617.476624 1167.704834 L 601.771851 1186.147705 L 565.530212 1200 L 535.328857 1177.046997 L 519.302124 1139.919556 L 535.328857 1066.550537 L 554.657776 970.792053 L 570.362488 894.68457 L 584.536926 800.134277 L 592.993347 768.724976 L 592.429626 766.630859 L 585.503479 767.516968 L 514.22821 865.369263 L 405.825531 1011.865906 L 320.053711 1103.677979 L 299.516815 1111.812256 L 263.919525 1093.369263 L 267.221497 1060.429688 L 287.114136 1031.114136 L 405.825531 880.107361 L 477.422913 786.52356 L 523.651062 732.483276 L 523.328918 724.671265 L 520.590698 724.671265 L 205.288605 929.395935 L 149.154434 936.644409 L 124.993355 914.01355 L 127.973183 876.885986 L 139.409409 864.80542 L 234.201385 799.570435 L 233.879227 799.8927 Z"/></svg>Claude Code Ecosystem</h1>
              <p style={{ margin: "6px 0 0", color: "#64748b", fontSize: 13 }}>Ordered by learning sequence &middot; Click any card to explore</p>
            </div>

            {/* Learning path bar */}
            <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 12, overflow: "hidden", border: "1px solid #e2e8f0" }}>
              {learningSteps.map((step, i) => {
                const c = concepts.find(x => x.id === step.id);
                const isActive = active === step.id;
                return (
                  <div
                    key={step.id}
                    onClick={() => setActive(active === step.id ? null : step.id)}
                    style={{
                      flex: 1, padding: "10px 6px", textAlign: "center", cursor: "pointer",
                      background: isActive ? c.bg : "#fff",
                      borderRight: i < learningSteps.length - 1 ? "1px solid #e2e8f0" : "none",
                      transition: "background 0.15s",
                    }}
                  >
                    <div style={{ fontSize: 18 }}>{c.emoji}</div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: isActive ? c.color : "#94a3b8", marginTop: 2 }}>{step.label}</div>
                  </div>
                );
              })}
            </div>

            {/* Concept Cards */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
              {concepts.map((c, idx) => {
                const step = learningSteps.find(s => s.id === c.id);
                const isOpen = active === c.id;
                return (
                  <div
                    key={c.id}
                    onClick={() => setActive(isOpen ? null : c.id)}
                    style={{
                      background: isOpen ? c.bg : "#fff",
                      border: `2px solid ${isOpen ? c.color : "#e2e8f0"}`,
                      borderRadius: 14,
                      padding: "14px 20px",
                      cursor: "pointer",
                      transition: "all 0.18s ease",
                      boxShadow: isOpen ? `0 4px 20px ${c.color}22` : "0 1px 3px #0001",
                    }}
                  >
                    {/* Card header row */}
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ position: "relative", flexShrink: 0 }}>
                        <div style={{
                          width: 46, height: 46, borderRadius: 12,
                          background: c.bg, border: `2px solid ${c.border}`,
                          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
                        }}>{c.emoji}</div>
                        <div style={{
                          position: "absolute", top: -6, left: -6,
                          width: 18, height: 18, borderRadius: "50%",
                          background: c.color, color: "#fff",
                          fontSize: 10, fontWeight: 800,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>{idx + 1}</div>
                      </div>

                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>{c.label}</span>
                          <span style={{
                            fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 20,
                            background: c.bg, color: c.color, border: `1px solid ${c.border}`,
                          }}>{c.scope}</span>
                          <span style={{
                            fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 20,
                            background: "#f1f5f9", color: "#475569",
                          }}>{"\u26A1"} {c.activation}</span>
                        </div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{c.tagline}</div>
                        {step && <div style={{ fontSize: 11, color: c.color, marginTop: 2, fontStyle: "italic" }}>{step.note}</div>}
                      </div>

                      <div style={{
                        fontSize: 16, color: isOpen ? c.color : "#cbd5e1",
                        transform: isOpen ? "rotate(180deg)" : "rotate(0)",
                        transition: "transform 0.2s", flexShrink: 0,
                      }}>{"\u25BE"}</div>
                    </div>

                    {/* Expanded detail */}
                    {isOpen && (
                      <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${c.border}` }}>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10, marginBottom: 14 }}>
                          {[
                            { label: "Best for", value: c.bestFor },
                            { label: "Token cost", value: c.tokenCost },
                            { label: "Install", value: c.install, mono: true },
                          ].map(item => (
                            <div key={item.label} style={{ background: "#fff", borderRadius: 8, padding: "9px 12px", border: "1px solid #e2e8f0" }}>
                              <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>{item.label}</div>
                              <div style={{ fontSize: 12, color: "#0f172a", fontFamily: item.mono ? "monospace" : "inherit", wordBreak: "break-all" }}>{item.value}</div>
                            </div>
                          ))}
                        </div>

                        {/* Examples */}
                        <div style={{ marginBottom: c.builtins ? 14 : 0 }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>
                            {c.builtins ? "User-defined examples" : "Examples"}
                          </div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {c.examples.map(ex => (
                              <span key={ex} style={{
                                fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 7,
                                background: c.bg, color: c.color, border: `1px solid ${c.border}`, fontFamily: "monospace",
                              }}>{ex}</span>
                            ))}
                          </div>
                        </div>

                        {/* Built-in commands */}
                        {c.builtins && (
                          <div style={{ background: "#fff", borderRadius: 10, padding: "12px 14px", border: "1px solid #e2e8f0" }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
                              Built-in commands <span style={{ fontWeight: 400, textTransform: "none", fontSize: 10, color: "#94a3b8" }}>&mdash; ship with Claude Code, always available</span>
                            </div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                              {c.builtins.map(b => (
                                <div key={b.cmd} style={{
                                  background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8,
                                  padding: "5px 10px", display: "flex", alignItems: "center", gap: 8,
                                }}>
                                  <code style={{ fontSize: 12, fontWeight: 700, color: "#0f172a" }}>{b.cmd}</code>
                                  <span style={{ fontSize: 11, color: "#64748b" }}>{b.desc}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Flow diagram */}
            <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: "18px 20px" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 2, marginBottom: 14 }}>How they fit together</div>
              <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 6, justifyContent: "center", marginBottom: 14 }}>
                {[
                  { label: "User Input", bg: "#f1f5f9", color: "#475569", border: "#e2e8f0" },
                  null,
                  { label: "\u26A1 Commands", bg: "#fffbeb", color: "#d97706", border: "#fde68a" },
                  null,
                  { label: "\uD83E\uDDE0 Skills", bg: "#ecfeff", color: "#0891b2", border: "#a5f3fc" },
                  null,
                  { label: "\uD83D\uDD27 MCP Tools", bg: "#eef2ff", color: "#6366f1", border: "#c7d2fe" },
                ].map((item, i) =>
                  item === null ? (
                    <span key={i} style={{ color: "#94a3b8", fontSize: 16 }}>{"\u2192"}</span>
                  ) : (
                    <span key={i} style={{
                      fontSize: 11, fontWeight: 600, padding: "5px 11px", borderRadius: 20,
                      background: item.bg, color: item.color, border: `1px solid ${item.border}`,
                    }}>{item.label}</span>
                  )
                )}
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 20, flexWrap: "wrap" }}>
                {[
                  { emoji: "\uD83D\uDEE1\uFE0F", label: "Hooks", color: "#dc2626", note: "enforce rules at every step" },
                  { emoji: "\uD83D\uDCE6", label: "Plugins", color: "#7c3aed", note: "bundle & distribute everything above" },
                ].map(item => (
                  <div key={item.label} style={{
                    display: "flex", alignItems: "center", gap: 8,
                    background: "#f8fafc", border: "1px solid #e2e8f0",
                    borderRadius: 10, padding: "8px 14px",
                  }}>
                    <span style={{ fontSize: 18 }}>{item.emoji}</span>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: item.color }}>{item.label}</div>
                      <div style={{ fontSize: 11, color: "#64748b" }}>{item.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "center", gap: 10, marginTop: 16, flexWrap: "wrap" }}>
              <a href="claude-cheatsheet-print.html" style={{ fontSize: 12, fontWeight: 700, color: "#d97757", background: "#fef5f0", border: "1px solid #fed7aa", borderRadius: 8, padding: "6px 14px", textDecoration: "none" }}>{"📄"} Save as PDF</a>
            </div>

            <div className="doc-footer" style={{ textAlign: "center", marginTop: 12 }}>
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap", fontSize: 12 }}>
                <a href="https://docs.anthropic.com/en/docs/claude-code" target="_blank" rel="noopener">Official Docs</a>
                <span style={{ color: "#cbd5e1" }}>|</span>
                <a href="https://github.com/anthropics/claude-code" target="_blank" rel="noopener">GitHub</a>
                <span style={{ color: "#cbd5e1" }}>|</span>
                <a href="https://modelcontextprotocol.io" target="_blank" rel="noopener">MCP Spec</a>
              </div>
              <div style={{ color: "#94a3b8", fontSize: 11, marginTop: 6 }}>Updated 6 March 2026 &middot; Claude Code v2.1.70</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
