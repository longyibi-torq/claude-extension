<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT / Codex Ecosystem Diagram</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .back-link {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600;
      color: #10a37f; text-decoration: none;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;

  </style>
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const concepts = [
      {
        id: "commands",
        label: "Slash Commands",
        emoji: "\u26A1",
        color: "#d97706",
        bg: "#fffbeb",
        border: "#fde68a",
        scope: "Codex CLI / IDE",
        activation: "User types /cmd",
        tokenCost: "Minimal",
        bestFor: "Manual workflow shortcuts",
        install: "Built-in; custom via AGENTS.md or config",
        examples: ["/resume", "/fork", "/compact", "/clear", "/diff", "/review"],
        tagline: "The shortcuts \u2014 quick triggers for frequent workflows",
        builtins: [
          { cmd: "/init", desc: "Generate AGENTS.md scaffold" },
          { cmd: "/resume", desc: "Reopen saved conversations" },
          { cmd: "/fork", desc: "Clone into new thread" },
          { cmd: "/compact", desc: "Summarize to save tokens" },
          { cmd: "/clear", desc: "Start a fresh chat" },
        ],
      },
      {
        id: "mcp",
        label: "Function Calling / MCP",
        emoji: "\uD83D\uDD27",
        color: "#10a37f",
        bg: "#ecfdf5",
        border: "#a7f3d0",
        scope: "ChatGPT + Codex + API",
        activation: "On demand / always available",
        tokenCost: "High (front-loaded)",
        bestFor: "External APIs & data",
        install: "API payload or MCP server config",
        examples: ["GitHub", "Postgres", "Slack", "Zapier", "Stripe", "web_search"],
        tagline: "The nervous system \u2014 connects the model to external tools and real-world data",
      },
      {
        id: "skills",
        label: "Skills",
        emoji: "\uD83E\uDDE0",
        color: "#0891b2",
        bg: "#ecfeff",
        border: "#a5f3fc",
        scope: "Codex CLI + IDE + App (open standard)",
        activation: "Auto (context-matching) or $skill",
        tokenCost: "~100 tokens until needed",
        bestFor: "Repeatable coding expertise",
        install: ".agents/skills/<name>/SKILL.md",
        examples: ["linear", "tdd", "code-review", "deploy", "docx"],
        tagline: "The playbook \u2014 modular instructions the agent discovers and loads on demand",
      },
      {
        id: "gpts",
        label: "Custom GPTs",
        emoji: "\uD83E\uDD16",
        color: "#7c3aed",
        bg: "#f5f3ff",
        border: "#ddd6fe",
        scope: "ChatGPT only",
        activation: "Via GPT Store or direct link",
        tokenCost: "Depends on configuration",
        bestFor: "End-user personas & workflows",
        install: "GPT Builder \u2192 GPT Store or private link",
        examples: ["DALL\u00B7E", "Data Analyst", "Canva", "Consensus", "Code Copilot"],
        tagline: "The product layer \u2014 full personas with custom instructions, tools & storefront",
      },
      {
        id: "plugins",
        label: "Plugins",
        emoji: "\uD83D\uDCE6",
        color: "#ef4444",
        bg: "#fef2f2",
        border: "#fca5a5",
        scope: "Codex CLI",
        activation: "Via install",
        tokenCost: "Depends on contents",
        bestFor: "Team sharing & distribution",
        install: "/plugin install plugin-name@marketplace",
        examples: ["Local marketplace", "GitHub repos", "Skills + MCP bundles"],
        tagline: "The container \u2014 bundles skills, MCP servers & apps for easy distribution (v0.110.0+)",
      },
    ];

    const hooksNote = {
      id: "hooks",
      label: "Hooks",
      emoji: "\uD83D\uDEE1\uFE0F",
      color: "#94a3b8",
      bg: "#f8fafc",
      border: "#e2e8f0",
      note: "No native hooks in Codex CLI. Hook-like behavior available via Cursor (by Anysphere) which introduced hooks in v1.7. For deterministic enforcement, Claude Code is currently the stronger choice.",
    };

    const learningSteps = [
      { id: "commands", label: "1. Start here", note: "Built-in commands work immediately" },
      { id: "mcp",      label: "2. Connect tools", note: "Link to external APIs and services" },
      { id: "skills",   label: "3. Teach expertise", note: "Auto-loaded domain knowledge (open standard)" },
      { id: "gpts",     label: "4. Build personas", note: "Full AI personas with tools & storefront" },
      { id: "plugins",  label: "5. Bundle & share", note: "Package skills + MCP for distribution" },
    ];

    function App() {
      const [active, setActive] = useState(null);

      return (
        <div style={{ fontFamily: "'Segoe UI', sans-serif", background: "#f8fafc", minHeight: "100vh", padding: "24px 16px" }}>
          <div style={{ maxWidth: 860, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: "#94a3b8", textTransform: "uppercase", marginBottom: 6 }}>Reference Guide</div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}><svg width="28" height="28" viewBox="0 0 158.7128 157.296" xmlns="http://www.w3.org/2000/svg"><path fill="#000" d="M60.8734,57.2556v-14.9432c0-1.2586.4722-2.2029,1.5728-2.8314l30.0443-17.3023c4.0899-2.3593,8.9662-3.4599,13.9988-3.4599,18.8759,0,30.8307,14.6289,30.8307,30.2006,0,1.1007,0,2.3593-.158,3.6178l-31.1446-18.2467c-1.8872-1.1006-3.7754-1.1006-5.6629,0l-39.4812,22.9651ZM131.0276,115.4561v-35.7074c0-2.2028-.9446-3.7756-2.8318-4.8763l-39.481-22.9651,12.8982-7.3934c1.1007-.6285,2.0453-.6285,3.1458,0l30.0441,17.3024c8.6523,5.0341,14.4708,15.7296,14.4708,26.1107,0,11.9539-7.0769,22.965-18.2461,27.527v.0021ZM51.593,83.9964l-12.8982-7.5497c-1.1007-.6285-1.5728-1.5728-1.5728-2.8314v-34.6048c0-16.8303,12.8982-29.5722,30.3585-29.5722,6.607,0,12.7403,2.2029,17.9324,6.1349l-30.987,17.9324c-1.8871,1.1007-2.8314,2.6735-2.8314,4.8764v45.6159l-.0014-.0015ZM79.3562,100.0403l-18.4829-10.3811v-22.0209l18.4829-10.3811,18.4812,10.3811v22.0209l-18.4812,10.3811ZM91.2319,147.8591c-6.607,0-12.7403-2.2031-17.9324-6.1344l30.9866-17.9333c1.8872-1.1005,2.8318-2.6728,2.8318-4.8759v-45.616l13.0564,7.5498c1.1005.6285,1.5723,1.5728,1.5723,2.8314v34.6051c0,16.8297-13.0564,29.5723-30.5147,29.5723v.001ZM53.9522,112.7822l-30.0443-17.3024c-8.652-5.0343-14.471-15.7296-14.471-26.1107,0-12.1119,7.2356-22.9652,18.403-27.5272v35.8634c0,2.2028.9443,3.7756,2.8314,4.8763l39.3248,22.8068-12.8982,7.3938c-1.1007.6287-2.045.6287-3.1456,0ZM52.2229,138.5791c-17.7745,0-30.8306-13.3713-30.8306-29.8871,0-1.2585.1578-2.5169.3143-3.7754l30.987,17.9323c1.8871,1.1005,3.7757,1.1005,5.6628,0l39.4811-22.807v14.9435c0,1.2585-.4721,2.2021-1.5728,2.8308l-30.0443,17.3025c-4.0898,2.359-8.9662,3.4605-13.9989,3.4605h.0014ZM91.2319,157.296c19.0327,0,34.9188-13.5272,38.5383-31.4594,17.6164-4.562,28.9425-21.0779,28.9425-37.908,0-11.0112-4.719-21.7066-13.2133-29.4143.7867-3.3035,1.2595-6.607,1.2595-9.909,0-22.4929-18.2471-39.3247-39.3251-39.3247-4.2461,0-8.3363.6285-12.4262,2.045-7.0792-6.9213-16.8318-11.3254-27.5271-11.3254-19.0331,0-34.9191,13.5268-38.5384,31.4591C11.3255,36.0212,0,52.5373,0,69.3675c0,11.0112,4.7184,21.7065,13.2125,29.4142-.7865,3.3035-1.2586,6.6067-1.2586,9.9092,0,22.4923,18.2466,39.3241,39.3248,39.3241,4.2462,0,8.3362-.6277,12.426-2.0441,7.0776,6.921,16.8302,11.3251,27.5271,11.3251Z"/></svg>ChatGPT / Codex Ecosystem</h1>
              <p style={{ margin: "6px 0 0", color: "#64748b", fontSize: 13 }}>Ordered by learning sequence &middot; Click any card to explore</p>
            </div>

            {/* Learning path bar */}
            <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 12, overflow: "hidden", border: "1px solid #e2e8f0" }}>
              {learningSteps.map((step, i) => {
                const c = concepts.find(x => x.id === step.id);
                const isActive = active === step.id;
                return (
                  <div
                    key={step.id}
                    onClick={() => setActive(active === step.id ? null : step.id)}
                    style={{
                      flex: 1, padding: "10px 6px", textAlign: "center", cursor: "pointer",
                      background: isActive ? c.bg : "#fff",
                      borderRight: i < learningSteps.length - 1 ? "1px solid #e2e8f0" : "none",
                      transition: "background 0.15s",
                    }}
                  >
                    <div style={{ fontSize: 18 }}>{c.emoji}</div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: isActive ? c.color : "#94a3b8", marginTop: 2 }}>{step.label}</div>
                  </div>
                );
              })}
            </div>

            {/* Concept Cards */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
              {concepts.map((c, idx) => {
                const step = learningSteps.find(s => s.id === c.id);
                const isOpen = active === c.id;
                return (
                  <div
                    key={c.id}
                    onClick={() => setActive(isOpen ? null : c.id)}
                    style={{
                      background: isOpen ? c.bg : "#fff",
                      border: `2px solid ${isOpen ? c.color : "#e2e8f0"}`,
                      borderRadius: 14,
                      padding: "14px 20px",
                      cursor: "pointer",
                      transition: "all 0.18s ease",
                      boxShadow: isOpen ? `0 4px 20px ${c.color}22` : "0 1px 3px #0001",
                    }}
                  >
                    {/* Card header row */}
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ position: "relative", flexShrink: 0 }}>
                        <div style={{
                          width: 46, height: 46, borderRadius: 12,
                          background: c.bg, border: `2px solid ${c.border}`,
                          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
                        }}>{c.emoji}</div>
                        <div style={{
                          position: "absolute", top: -6, left: -6,
                          width: 18, height: 18, borderRadius: "50%",
                          background: c.color, color: "#fff",
                          fontSize: 10, fontWeight: 800,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>{idx + 1}</div>
                      </div>

                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>{c.label}</span>
                          <span style={{
                            fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 20,
                            background: c.bg, color: c.color, border: `1px solid ${c.border}`,
                          }}>{c.scope}</span>
                          <span style={{
                            fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 20,
                            background: "#f1f5f9", color: "#475569",
                          }}>{"\u26A1"} {c.activation}</span>
                        </div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{c.tagline}</div>
                        {step && <div style={{ fontSize: 11, color: c.color, marginTop: 2, fontStyle: "italic" }}>{step.note}</div>}
                      </div>

                      <div style={{
                        fontSize: 16, color: isOpen ? c.color : "#cbd5e1",
                        transform: isOpen ? "rotate(180deg)" : "rotate(0)",
                        transition: "transform 0.2s", flexShrink: 0,
                      }}>{"\u25BE"}</div>
                    </div>

                    {/* Expanded detail */}
                    {isOpen && (
                      <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${c.border}` }}>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10, marginBottom: 14 }}>
                          {[
                            { label: "Best for", value: c.bestFor },
                            { label: "Token cost", value: c.tokenCost },
                            { label: "Install", value: c.install, mono: true },
                          ].map(item => (
                            <div key={item.label} style={{ background: "#fff", borderRadius: 8, padding: "9px 12px", border: "1px solid #e2e8f0" }}>
                              <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>{item.label}</div>
                              <div style={{ fontSize: 12, color: "#0f172a", fontFamily: item.mono ? "monospace" : "inherit", wordBreak: "break-all" }}>{item.value}</div>
                            </div>
                          ))}
                        </div>

                        {/* Examples */}
                        <div style={{ marginBottom: c.builtins ? 14 : 0 }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>
                            {c.builtins ? "Custom examples" : "Examples"}
                          </div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {c.examples.map(ex => (
                              <span key={ex} style={{
                                fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 7,
                                background: c.bg, color: c.color, border: `1px solid ${c.border}`, fontFamily: "monospace",
                              }}>{ex}</span>
                            ))}
                          </div>
                        </div>

                        {/* Built-in commands */}
                        {c.builtins && (
                          <div style={{ background: "#fff", borderRadius: 10, padding: "12px 14px", border: "1px solid #e2e8f0" }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
                              Built-in commands <span style={{ fontWeight: 400, textTransform: "none", fontSize: 10, color: "#94a3b8" }}>&mdash; ship with Codex CLI, always available</span>
                            </div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                              {c.builtins.map(b => (
                                <div key={b.cmd} style={{
                                  background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8,
                                  padding: "5px 10px", display: "flex", alignItems: "center", gap: 8,
                                }}>
                                  <code style={{ fontSize: 12, fontWeight: 700, color: "#0f172a" }}>{b.cmd}</code>
                                  <span style={{ fontSize: 11, color: "#64748b" }}>{b.desc}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* No Hooks callout */}
            <div style={{
              background: "#fff", border: "2px dashed #e2e8f0", borderRadius: 14,
              padding: "14px 20px", marginBottom: 24,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{
                  width: 46, height: 46, borderRadius: 12,
                  background: hooksNote.bg, border: `2px solid ${hooksNote.border}`,
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
                }}>{hooksNote.emoji}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontWeight: 700, fontSize: 15, color: "#94a3b8" }}>{hooksNote.label}</span>
                    <span style={{
                      fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 20,
                      background: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca",
                    }}>Not available natively</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 4, lineHeight: 1.5 }}>{hooksNote.note}</div>
                </div>
              </div>
            </div>

            {/* Flow diagram */}
            <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: "18px 20px" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 2, marginBottom: 14 }}>How they fit together</div>
              <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 6, justifyContent: "center", marginBottom: 14 }}>
                {[
                  { label: "User Input", bg: "#f1f5f9", color: "#475569", border: "#e2e8f0" },
                  null,
                  { label: "\u26A1 Slash Commands", bg: "#fffbeb", color: "#d97706", border: "#fde68a" },
                  null,
                  { label: "\uD83E\uDDE0 Skills", bg: "#ecfeff", color: "#0891b2", border: "#a5f3fc" },
                  null,
                  { label: "\uD83D\uDD27 Function Calling / MCP", bg: "#ecfdf5", color: "#10a37f", border: "#a7f3d0" },
                ].map((item, i) =>
                  item === null ? (
                    <span key={i} style={{ color: "#94a3b8", fontSize: 16 }}>{"\u2192"}</span>
                  ) : (
                    <span key={i} style={{
                      fontSize: 11, fontWeight: 600, padding: "5px 11px", borderRadius: 20,
                      background: item.bg, color: item.color, border: `1px solid ${item.border}`,
                    }}>{item.label}</span>
                  )
                )}
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 20, flexWrap: "wrap" }}>
                {[
                  { emoji: "\uD83E\uDD16", label: "Custom GPTs", color: "#7c3aed", note: "bundle personas, instructions & tools for end users" },
                  { emoji: "\uD83D\uDCE6", label: "Plugins", color: "#ef4444", note: "bundle & distribute skills, MCP servers & apps (v0.110.0+)" },
                  { emoji: "\uD83D\uDEE1\uFE0F", label: "Hooks", color: "#94a3b8", note: "not natively available \u2014 use Cursor for hook-like behavior" },
                ].map(item => (
                  <div key={item.label} style={{
                    display: "flex", alignItems: "center", gap: 8,
                    background: "#f8fafc", border: "1px solid #e2e8f0",
                    borderRadius: 10, padding: "8px 14px",
                  }}>
                    <span style={{ fontSize: 18 }}>{item.emoji}</span>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: item.color }}>{item.label}</div>
                      <div style={{ fontSize: 11, color: "#64748b" }}>{item.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Unique concepts callout */}
            <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: "18px 20px", marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 2, marginBottom: 14 }}>Key concepts unique to OpenAI</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                {[
                  { label: "AGENTS.md", desc: "Project context file (like Claude's CLAUDE.md)", color: "#10a37f", bg: "#ecfdf5", border: "#a7f3d0" },
                  { label: "GPT Store", desc: "Marketplace for Custom GPTs with 100K+ published GPTs", color: "#7c3aed", bg: "#f5f3ff", border: "#ddd6fe" },
                  { label: "Session Forking", desc: "/fork \u2014 clone conversation into a new thread", color: "#d97706", bg: "#fffbeb", border: "#fde68a" },
                  { label: "Cloud Sandboxes", desc: "Ephemeral sandboxes for fully autonomous, async task delegation", color: "#0891b2", bg: "#ecfeff", border: "#a5f3fc" },
                ].map(item => (
                  <div key={item.label} style={{
                    flex: "1 1 180px", background: item.bg, border: `1px solid ${item.border}`,
                    borderRadius: 10, padding: "10px 14px",
                  }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: item.color, marginBottom: 2 }}>{item.label}</div>
                    <div style={{ fontSize: 11, color: "#64748b" }}>{item.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Cross-platform note */}
            <div style={{ background: "#ecfeff", border: "1px solid #a5f3fc", borderRadius: 16, padding: "14px 20px", marginTop: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#0891b2", marginBottom: 4 }}>Skills are a shared standard</div>
              <div style={{ fontSize: 12, color: "#475569", lineHeight: 1.6 }}>
                Skills (SKILL.md) are not OpenAI-proprietary &mdash; they are an open standard originated by Anthropic and adopted across Claude Code (<code style={{ fontSize: 11, background: "#fff", padding: "1px 4px", borderRadius: 3 }}>.claude/skills/</code>), Codex (<code style={{ fontSize: 11, background: "#fff", padding: "1px 4px", borderRadius: 3 }}>.agents/skills/</code>), Google Antigravity (<code style={{ fontSize: 11, background: "#fff", padding: "1px 4px", borderRadius: 3 }}>.agent/skills/</code>), Cursor, and the skills.sh registry.
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "center", gap: 10, marginTop: 16, flexWrap: "wrap" }}>
              <a href="chatgpt-cheatsheet-print.html" style={{ fontSize: 12, fontWeight: 700, color: "#10a37f", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8, padding: "6px 14px", textDecoration: "none" }}>{"📄"} Save as PDF</a>
